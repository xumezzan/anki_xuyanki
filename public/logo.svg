<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Main background gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#1a1040"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </linearGradient>

    <!-- Card gradient blue-violet -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>

    <!-- Card back gradient -->
    <linearGradient id="cardBackGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#312e81"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>

    <!-- Glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#4f46e5" flood-opacity="0.5"/>
    </filter>

    <!-- Ambient glow -->
    <filter id="ambientGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
      </feMerge>
    </filter>

    <clipPath id="roundRect">
      <rect x="60" y="60" width="280" height="280" rx="56" ry="56"/>
    </clipPath>
  </defs>

  <!-- Background circle -->
  <rect width="400" height="400" fill="url(#bgGrad)" rx="80" ry="80"/>

  <!-- Ambient purple glow top-left -->
  <circle cx="100" cy="100" r="80" fill="#6d28d9" opacity="0.15" filter="url(#ambientGlow)"/>
  <!-- Ambient blue glow bottom-right -->
  <circle cx="300" cy="300" r="80" fill="#2563eb" opacity="0.12" filter="url(#ambientGlow)"/>

  <!-- Card BACK (slightly rotated, behind) -->
  <g transform="translate(200,185) rotate(-10) translate(-75,-90)">
    <rect x="0" y="0" width="150" height="110" rx="18" ry="18" fill="url(#cardBackGrad)" opacity="0.85"/>
    <!-- lines on back card -->
    <rect x="16" y="28" width="80" height="7" rx="4" fill="white" opacity="0.15"/>
    <rect x="16" y="44" width="60" height="5" rx="3" fill="white" opacity="0.10"/>
    <rect x="16" y="57" width="90" height="5" rx="3" fill="white" opacity="0.08"/>
  </g>

  <!-- Card FRONT (main, centered) -->
  <g filter="url(#shadow)">
    <rect x="110" y="120" width="180" height="130" rx="22" ry="22" fill="url(#cardGrad)"/>
    <!-- Shine overlay -->
    <rect x="110" y="120" width="180" height="55" rx="22" ry="22" fill="white" opacity="0.06"/>
    <!-- Letter A — big, bold, on card -->
    <text x="200" y="195" text-anchor="middle" dominant-baseline="middle"
          font-family="'Helvetica Neue', Arial, sans-serif"
          font-size="62" font-weight="900" fill="white" opacity="0.95"
          filter="url(#glow)">A</text>
    <!-- small label "eng" on card bottom -->
    <text x="200" y="232" text-anchor="middle"
          font-family="'Helvetica Neue', Arial, sans-serif"
          font-size="12" font-weight="600" letter-spacing="4"
          fill="white" opacity="0.55">WORDS</text>
  </g>

  <!-- Sparkle dots -->
  <circle cx="145" cy="118" r="4" fill="#a78bfa" opacity="0.9" filter="url(#glow)"/>
  <circle cx="258" cy="112" r="3" fill="#60a5fa" opacity="0.8"/>
  <circle cx="280" cy="260" r="2.5" fill="#818cf8" opacity="0.7"/>
  <circle cx="122" cy="255" r="3" fill="#c4b5fd" opacity="0.6"/>

  <!-- Small star top-right -->
  <g transform="translate(295, 115)" opacity="0.8">
    <polygon points="0,-8 2,-3 7,-3 3,1 5,6 0,3 -5,6 -3,1 -7,-3 -2,-3"
             fill="#fbbf24" filter="url(#glow)"/>
  </g>

  <!-- Bottom name text -->
  <text x="200" y="322" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="22" font-weight="800" letter-spacing="2"
        fill="white" opacity="0.95">ANKI</text>
  <text x="200" y="350" text-anchor="middle"
        font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="15" font-weight="500" letter-spacing="5"
        fill="#a78bfa" opacity="0.85">HUYANKI</text>
</svg>
